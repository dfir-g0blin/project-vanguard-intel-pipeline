name: Project Vanguard Pipeline Orchestrator
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Source Repository Ingestion
        uses: actions/checkout@v6

      - name: Environment Workspace Verification
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Dependency Mapping Framework Installs
        run: |
          pip install pysigma pysigma-backend-secops google-auth requests ioc-finder
          
          # Ingest the official v0.5.0 Linux tarball release
          curl -L https://github.com/timescale/rsigma/releases/download/v0.5.0/rsigma-x86_64-unknown-linux-gnu.tar.gz -o rsigma.tar.gz
          
          # Extract the compressed binary archive
          tar -xzf rsigma.tar.gz
          
          # Move the verified binary target to system paths with admin privileges
          sudo mv rsigma /usr/local/bin/rsigma
          sudo chmod +x /usr/local/bin/rsigma
          
          # Clean up the workspace archive residue
          rm rsigma.tar.gz

      - name: Execute Live Orchestration Suite
        env:
          SIEM_API_CREDENTIALS: ${{ secrets.SANITIZED_SIEM_SECRET_PASSTHROUGH }}
        run: python scripts/vanguard_orchestrator.py