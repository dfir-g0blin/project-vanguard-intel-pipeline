name: Project Vanguard Pipeline Orchestrator
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Source Repository Ingestion
        uses: actions/checkout@v6

      - name: Environment Workspace Verification
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Dependency Mapping Framework Installs
        run: |
          pip install pysigma pysigma-backend-secops google-auth requests ioc-finder

      - name: Execute Live Orchestration Suite
        env:
          SIEM_API_CREDENTIALS: ${{ secrets.SANITIZED_SIEM_SECRET_PASSTHROUGH }}
        run: python scripts/vanguard_orchestrator.py